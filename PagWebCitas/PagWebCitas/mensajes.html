<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mensajes</title>
<link rel="stylesheet" href="mensajes.css">
</head>

<body onload="cargarMensajes()">

<!-- HEADER -->
<div class="header">
    <button id="btnVolver" onclick="window.location='dashboard.html'">← Volver</button>
    <h2>Mensajes</h2>
</div>

<div class="container">

    <div class="chat">

        <!-- INFO DOCTOR -->
        <div class="chat-header">
            Dr. Juan Pérez - Medicina General
        </div>

        <!-- MENSAJES -->
        <div id="chatBox" class="chat-box"></div>

        <!-- INPUT -->
        <div class="chat-input">
            <input id="mensajeInput" type="text" placeholder="Escribe tu mensaje...">
            <button id="btnEnviarMsg" onclick="enviarMensaje()">➤</button>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
